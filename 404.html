  <style>
    .err-wrap { min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    .err-code { font-family: var(--mono); font-size: 6rem; font-weight: 300; color: var(--border); line-height: 1; margin-bottom: 16px; }
    .err-title { font-size: 1.6rem; font-weight: 300; margin-bottom: 12px; }
    .err-sub { color: var(--muted); font-size: .9rem; font-weight: 300; line-height: 1.8; margin-bottom: 32px; }
    .err-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .err-btn { font-family: var(--mono); font-size: .68rem; letter-spacing: .12em; padding: 10px 22px; border-radius: 6px; text-decoration: none; transition: opacity .2s; }
    .err-btn.primary { background: var(--green); color: #000; font-weight: 700; }
    .err-btn.secondary { border: 1px solid var(--border); color: var(--muted); }
    .err-btn:hover { opacity: .8; }
  </style>
  <link rel="stylesheet" href="/css/mobile-fix.css">
  <style id="hamburger-style">
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; background:none; border:none; z-index:1001; }
    .hamburger span { display:block; width:24px; height:2px; background:var(--fg, #e0ffe0); border-radius:2px; transition:all .3s; }
    .hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; }
    .hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
    .mobile-menu { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.97); z-index:999; flex-direction:column; align-items:center; justify-content:center; gap:32px; }
    .mobile-menu.open { display:flex; }
    .mobile-menu a { font-family:var(--mono, monospace); font-size:1.1rem; letter-spacing:.12em; color:#e0ffe0; text-decoration:none; padding:8px 0; }
    .mobile-menu a.green { color:#00ff88; }
    .mobile-menu .mobile-github { background:#00ff88; color:#000; font-weight:700; padding:12px 28px; border-radius:6px; margin-top:8px; }
    @media (max-width:768px) {
      .hamburger { display:flex !important; }
      .nav-links { display:none !important; }
      .nav-cta { display:none !important; }
    }
  </style>

</head>
<body>
<nav class="nav" id="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><img src="assets/logo.png" class="nav-logo-img" alt="EvoClaw"><span class="g">EVO</span>CLAW</a>
        <ul class="nav-links">

      <li><a href="ask.html" style="color:var(--green)">ASK EVOCLAW</a></li>
      <li><a href="playground.html" style="color:var(--green)">PLAYGROUND</a></li>
    </ul>
    <a href="https://github.com/evoclaw-agent/evoclaw" target="_blank" class="nav-cta">GITHUB →</a>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">HOME</a>
  <a href="demo.html">LIVE DEMO</a>
  <a href="docs.html">DOCS</a>
  <a href="index.html#get-started">GET STARTED</a>
  <a href="ask.html" class="green">ASK EVOCLAW</a>
  <a href="playground.html" class="green">PLAYGROUND</a>
  <a href="https://github.com/evoclaw-agent/evoclaw" target="_blank" class="mobile-github">GITHUB →</a>
</div>
<script>
  var btn = document.getElementById('hamburger');
  var menu = document.getElementById('mobileMenu');
  btn.addEventListener('click', function() {
    btn.classList.toggle('open');
    menu.classList.toggle('open');
  });
  menu.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', function() {
      btn.classList.remove('open');
      menu.classList.remove('open');
    });
  });
</script>

<div class="err-wrap">
  <div>
    <div class="err-code">404</div>
    <img src="assets/logo.png" style="width:64px;opacity:.3;margin-bottom:20px" alt=""/>
    <h1 class="err-title">Page not found</h1>
    <p class="err-sub">This page doesn't exist or has been moved.<br>The agent hasn't learned this URL yet. 🦎</p>
    <div class="err-links">
      <a href="index.html" class="err-btn primary">GO HOME →</a>
      <a href="ask.html" class="err-btn secondary">ASK EVOCLAW</a>
      <a href="docs.html" class="err-btn secondary">DOCS</a>
    </div>
  </div>
</div>
</body>
</html>
